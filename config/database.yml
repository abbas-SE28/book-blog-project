default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: rails_user
  password: password123
  host: localhost

development:
  <<: *default
  database: book_blog_api_development

test:
  <<: *default
  database: book_blog_api_test

production:
  <<: *default
  database: book_blog_api_production
  username: book_blog_api
  password: <%= ENV['BOOK_BLOG_API_DATABASE_PASSWORD'] %>